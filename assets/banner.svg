<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none" role="img" aria-label="claude-onboarding — AI-powered onboarding audit">
  <rect width="1500" height="500" fill="#0a1628"/>

  <!-- Score bars icon (top-left, marks the brand) -->
  <g transform="translate(80, 90)">
    <rect width="160" height="10" rx="1" fill="#1e293b"/>
    <rect width="120" height="10" rx="1" fill="#10b981"/>

    <rect y="22" width="160" height="10" rx="1" fill="#1e293b"/>
    <rect y="22" width="148" height="10" rx="1" fill="#10b981"/>

    <rect y="44" width="160" height="10" rx="1" fill="#1e293b"/>
    <rect y="44" width="68" height="10" rx="1" fill="#10b981"/>
  </g>

  <!-- Stacked wordmark CLAUDE / ONBOARDING -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-weight="800" letter-spacing="-2">
    <text x="80" y="245" font-size="96" fill="#10b981">CLAUDE</text>
    <text x="80" y="335" font-size="96" fill="#10b981">ONBOARDING</text>
  </g>

  <!-- Divider line -->
  <line x1="80" y1="370" x2="700" y2="370" stroke="#10b981" stroke-width="2"/>

  <!-- Subtitle -->
  <text x="80" y="410"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="22"
        fill="#f8fafc"
        letter-spacing="1">AI-Powered Onboarding Audit</text>

  <!-- Right side: slash commands -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
     font-size="36"
     fill="#64748b"
     font-weight="400"
     text-anchor="end">
    <text x="1430" y="120">/onboarding audit</text>
    <text x="1430" y="170">/onboarding score</text>
    <text x="1430" y="220">/onboarding compare</text>
    <text x="1430" y="270">/onboarding rewrite</text>
    <text x="1430" y="320">/onboarding teardown</text>
    <text x="1430" y="370">/onboarding category &lt;type&gt;</text>
    <text x="1430" y="420" fill="#475569">/onboarding benchmark</text>
  </g>
</svg>
